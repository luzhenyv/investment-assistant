<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Trading Assistant{% block title %}{% endblock %}</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:     #0f0f0f;
    --bg2:    #1a1a1a;
    --bg3:    #242424;
    --border: #2e2e2e;
    --text:   #e2e2e2;
    --muted:  #888;
    --accent: #4a9eff;
    --green:  #3dd68c;
    --red:    #ff6b6b;
    --amber:  #fbbf24;
    --radius: 8px;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; line-height: 1.6; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  nav { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 0 24px; height: 48px; display: flex; align-items: center; gap: 24px; }
  nav .brand { font-weight: 600; font-size: 15px; color: var(--text); }
  nav a { color: var(--muted); font-size: 13px; }
  nav a:hover { color: var(--text); text-decoration: none; }

  .container { max-width: 1100px; margin: 0 auto; padding: 24px 16px; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 20px; }
  h2 { font-size: 15px; font-weight: 600; margin-bottom: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }

  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }

  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; padding: 8px 10px; border-bottom: 1px solid var(--border); }
  td { padding: 10px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg3); }

  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
  .badge-strong { background: #2d1b1b; color: #ff8080; }
  .badge-mid    { background: #1e2a1e; color: #6ee86e; }
  .badge-weak   { background: #1e1e2a; color: #8888ff; }

  .btn { display: inline-block; padding: 6px 14px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; transition: opacity .15s; }
  .btn:hover { opacity: .85; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-ghost   { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
  .btn-danger  { background: #3a1a1a; color: var(--red); border: 1px solid #5a2a2a; }
  .btn-sm { padding: 3px 10px; font-size: 12px; }

  form.inline { display: inline; }

  input, select, textarea {
    background: var(--bg3); color: var(--text); border: 1px solid var(--border);
    border-radius: 6px; padding: 7px 10px; font-size: 13px; font-family: var(--font);
    width: 100%;
  }
  input:focus, select:focus { outline: none; border-color: var(--accent); }
  label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 10px; }

  .price-up   { color: var(--green); }
  .price-down { color: var(--red); }
  .price-neutral { color: var(--text); }
  .muted { color: var(--muted); }
  .note-text { color: var(--muted); font-size: 12px; }
</style>
</head>
<body>
<nav>
  <span class="brand">Trading Assistant</span>
  <a href="/">Watchlist</a>
</nav>
<div class="container">
{% block content %}{% endblock %}
</div>
</body>
</html>

# Tunable parameters for the weekly decision engine.
# These are codified judgment, not validated thresholds — adjust as you learn.

data:
  period: "10y"           # yfinance history window to fetch (and cache); deep enough
                          # for a 2019 backtest replay start (live just reads the tail)
  min_rows: 200           # min usable rows per symbol; fewer => symbol skipped
                          # (need >= 200 + 252 trading days for MA200 + 52w window)

backtest:
  start: "2019-01-01"     # replay starts here; earlier data warms up the indicators
  train_end: "2023-01-01" # in-sample ends here; later dates report as out-of-sample
  costs:
    per_trade_bps: 5      # commission+slippage charged per buy/sell (~5 bps large-cap, Chan)
    cash_apy: 0.04        # annualized interest earned on idle cash

drift_band: 0.20          # allow +/-20% drift from target_weight before Trim/Add fires
cash_band:
  min: 0.10               # below this, suppress all new buys this week
  max: 0.25               # above this, prompt to deploy capital

scoring:
  rsi_overbought: 70      # >= this counts as "extended" (income heuristic)
  rsi_oversold: 40
  pullback_atr_mult: 0.5  # price within this many ATRs of MA50 => "pullback"
  accel_rsi: 62           # trend>=75 + (breakout or RSI>=this) => Trend Acceleration
  rs_lookback: 126        # trailing-return window for relative strength (~6 months)

# Fundamentals / valuation hints (quant/valuation.py). Report-only — does NOT feed the
# decision engine or backtest. Source: free Alpha Vantage OVERVIEW (PE/PEG/analyst target).
# Needs env var ALPHAVANTAGE_API_KEY; disabled (no-op) if unset. Free tier is 25 calls/day,
# so fundamentals are cached and a symbol is refetched only when its cache goes stale.
fundamentals:
  enabled: true
  refresh_days: 7         # refetch a symbol only when its cached copy is older than this
  max_api_calls_per_run: 20  # hard cap per run (headroom under the free 25/day limit)
  peg_cheap: 1.0          # PEG <= this => "cheap (growth-justified)"
  peg_rich: 2.0           # PEG >  this => "rich"; in between => "fair"

# Option-chain positioning hints (quant/option_flow.py). Report-only — does NOT feed the
# decision engine or backtest. Source: free yfinance chain (OI/volume/IV). Computes put/call
# walls, max pain, expected move, IV skew, and reward:risk odds, cross-referenced with the
# levels.py S/R zones. (Alpha Vantage options are premium-only, so yfinance is the source.)
option_positioning:
  enabled: true           # live yfinance chain fetch per held/watchlist name (~2 calls each)
  dte_lo: 25              # target the 3rd-Friday monthly with days-to-expiry in this range
  dte_hi: 45              # (most liquid; best signal for a weekly-cadence investor)
  band_floor: 0.70        # ignore strikes below this fraction of spot ...
  band_high: 1.30         # ... or above this — keep walls/max-pain near the actionable range
  skew_pct: 0.10          # OTM offset for the put-IV vs call-IV skew (±10% from spot)
  skew_warn: 0.05         # put-skew above this prints a "downside fear / dips may air-pocket" note
  rr_good: 2.0            # reward:risk at/above this reads "favourable"

# Support/resistance zone detection (quant/levels.py). Standalone scorer — does not
# feed the decision engine yet. Strength is fuzzy and RELATIVE to each ticker, so labels
# come from within-ticker score quantiles, not absolute cutoffs.
levels:
  pivot_k: 5              # fractal half-window: a swing high/low is the extreme of 2k+1 bars
  lookback_bars: 1000     # ~4y of daily structure (weekly uses lookback/5); the trader
                          # reads multi-year weekly structure, so reach back far enough
  price_floor_frac: 0.4   # ignore candidates below this fraction of current price ...
  price_ceiling_frac: 1.35 # ... or above this fraction. Bounds S/R to the actionable
                          # range a trader actually charts (not the ancient pre-growth base).
  box_win: 8              # window length (bars) for consolidation/range detection
  box_pct: 0.06           # a window is a "box" when its high-low range < this % of mean price
  fib_ratios: [0.236, 0.382, 0.5, 0.618, 0.786]
  cluster_pct: 0.02       # zone-merge tolerance as % of price ...
  cluster_atr_mult: 0.5   # ... or this many ATRs; effective tol = max(the two). Also touch tol.
                          # Kept modest so volatile names (semis) don't collapse distinct zones.
  max_zone_frac: 0.08     # hard cap on a zone's price span (% of price) — stops dense regions
                          # from chaining into one over-wide zone; keeps bands trader-tight.
  touch_cap: 5            # diminishing returns: touches beyond this don't add score
  confluence_bonus: 0.35  # per EXTRA distinct method in a zone (fib+swing+volume+... stacking)
  count_damp: 0.5         # divide a zone's summed score by members**count_damp. Near-price
                          # regions pile up candidates of every method; without damping the
                          # score ranks activity density rather than structural strength.
  # Confluence filter — driven by the out-of-sample edge test (scripts/level_edge.py), which
  # found a zone's reversal edge is monotonic in distinct-method count: 1-method zones reverse
  # LESS than a random level, only >=3-method zones beat it.
  min_methods: 2          # drop zones backed by fewer than this many distinct methods (noise)
  strong_min_methods: 3   # only >=3-method zones may earn strong / super-strong labels
  volume_bins: 40         # price buckets for volume-by-price nodes
  volume_node_mult: 1.3   # a bucket is a high-volume node when its volume > this * mean bucket
  vwap_anchors: 3         # number of major swing lows to anchor VWAP from (bullish dynamic support)
  weights:                # per-candidate score term weights
    kind: 1.0             # structural point (1.0) vs range band (0.6)
    duration: 2.5         # log1p(duration_days) — TIME PRIORITY, the lecture's #1 driver:
                          # long consolidations / major bases must outrank recent clusters
    touch: 0.8            # capped touch count
    reaction: 0.6         # bounce magnitude in ATRs (swing pivots)
    volume: 2.0           # volume-at-price ratio — conviction (lecture #4); deep high-volume
                          # bases are the trader's "super-strong" zones
    method: 1.0           # method_prior below
  method_prior:           # macro/structural > micro (lecture ordering)
    fib: 1.0
    swing: 1.0
    vwap: 0.9             # anchored VWAP (from major swing lows) — real-flow level institutions defend
    box: 0.8
    volume: 0.9
    ma: 0.5
    round: 0.4
  label_quantiles:        # within-ticker score quantile cuts -> ordinal label
    super_strong: 0.90
    strong: 0.65
    medium: 0.30

# Watchlist→holdings lifecycle + state-aware sizing.
lifecycle:
  accel_extra_steps: 1    # Trend Acceleration may take this many extra scale-in steps
                          # beyond target (ceiling = target*(1+extra/max_steps)); with
                          # max_steps=3 one extra step lifts 15%->20%, 10%->13.3%, 6%->8%
  max_positions: 8        # hold at most this many names (out of the wider watchlist).
                          # With 15% big-tier targets + 10% cash floor this concentrates
                          # in ~6 mega-caps; raise to ~10 to express the full tiered book
  entry_trend_min: 75     # min trend score to open a new watchlist position
  entry_default_weight: 0.06  # DEFAULT target weight for any name not listed in
                              # target_weights below (applies to new entries AND held
                              # names). 0.06 == the small/high-growth tier.
  max_steps: 3            # scale-in: reach target over this many weekly adds (step=target/3)
  rotation_margin: 0.10   # cash-low rotation: candidate must beat laggard RS by this
  # Watchlist diversification (both gates opt-in; omit BOTH => pure-RS ranking, backtest
  # byte-identical to before). Each gate measures redundancy against current holdings AND
  # already-kept candidates, so the shortlist stops being several names that are one trade.
  corr_max: 0.70          # drop a candidate whose daily-return corr to a kept/held name > this
  corr_lookback: 63       # trading days of daily returns used for the correlation (~3 months)
  # sector_cap: 2         # opt-in: max candidates per GICS sector, counting holdings. Coarse
                          # (GICS lumps all tech) — aggressive on a sector-concentrated book.

# Per-symbol target weight of total portfolio value. Symbols NOT listed here fall back to
# lifecycle.entry_default_weight (0.06) — i.e. treated as the small/high-growth tier by
# default, so the watchlist can grow without hand-setting a weight for every name.
# Three conviction tiers — let bigger/better-fundamental names size larger:
#   0.15  mega-cap leaders (step 5%, momentum ceiling 20%)
#   0.10  mid/large growth (step 3.3%, momentum ceiling ~13.3%)
#   0.06  small high-growth (step 2%, momentum ceiling 8%)
# A target is a ceiling, not a floor — a name can sit at 5% if the adds don't trigger.
target_weights:
  # 0.15 — mega-cap, strong fundamentals
  NVDA: 0.15
  GOOG: 0.15
  MSFT: 0.15
  META: 0.15
  AMZN: 0.15
  AVGO: 0.15
  # 0.10 — mid / large growth
  AMD:  0.10
  MU:   0.10
  MRVL: 0.10
  TSM:  0.10
  PLTR: 0.10
  HOOD: 0.10
  # 0.06 — small, high-speed development (HIMS/RKLB/NBIS have short history — see watchlist note)
  CRWD: 0.06
  NET:  0.06
  HIMS: 0.06
  RKLB: 0.06
  NBIS: 0.06

# Intent -> suggested option structure(s). A hint for the human; the engine does NOT pick strikes.
intent_strategy_map:
  "Add Core":          ["Buy shares", "Cash Secured Put"]
  "Trim":              ["Sell shares", "Covered Call"]
  "Generate Income":   ["Covered Call", "Cash Secured Put"]
  "Hedge":             ["Bear Put Spread"]
  "Increase Exposure": ["Bull Call Spread"]
  "Close":             ["Sell shares"]
  "Hold":              []

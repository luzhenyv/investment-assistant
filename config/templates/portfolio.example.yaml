# Portfolio template — copy into private/<profile>/portfolio.yaml and fill with real numbers.
# Update by hand each week (no broker integration in v0.1).
#
# FIELD REFERENCE
#   cash      Uninvested USD in the account. Counts toward total portfolio value AND
#             is checked against the cash band in config.yaml: below the band = "low"
#             (no new buys suggested), above = "high" (room to add).
#   core      SHARE COUNT of long-term holdings you don't intend to sell. Protected in
#             weak regimes (Correction / Panic) — the engine hedges instead of selling.
#   trading   SHARE COUNT of tactical shares you're willing to rotate out of.
#   avg_cost  Per-share cost basis under cost_method (may be negative when diluted).
#             INFORMATIONAL ONLY — no logic reads it.
#   cost_method  How avg_cost is computed: "diluted" (摊薄 — nets realized P&L into the
#             shares you still hold, so it can go negative = house money) or "average"
#             (持仓 — average price paid for shares held now, always ≥ 0). INFORMATIONAL ONLY.
#   plan      Your own one-line plan for this name — intended role/horizon, target,
#             conditions, thesis. FREEFORM and OPTIONAL. No engine logic reads it; it's
#             surfaced in the report and JSON so the weekly-review LLM can compare your
#             intent against the engine's "Role · Horizon". Use a YAML block (>) to go long.
#
# Position weight = total shares (core + trading); the split only matters under stress.
# Share counts may be fractional. Full guide: docs/REAL_PORTFOLIO_SETUP.md
cash: 0
cost_method: diluted   # diluted | average

positions:
  # SYMBOL: { core: <shares>, trading: <shares>, avg_cost: <price/share> }
  MSFT: { core: 0, trading: 0, avg_cost: 0 }

  # With a plan (expanded form so the freeform note is readable):
  # NVDA:
  #   core: 0
  #   trading: 0
  #   avg_cost: 0
  #   plan: >
  #     Core compounder through the AI capex cycle. Add below $150, trim only above $250.
  #     Don't close on a trend wobble — thesis breaks on hyperscaler capex cuts, not price.
